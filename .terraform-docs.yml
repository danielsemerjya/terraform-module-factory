formatter: markdown table

output:
  file: README.md
  mode: inject
  template: |-
    <!-- BEGIN_TF_DOCS -->
    {{ .Content }}
    <!-- END_TF_DOCS -->

sort:
  enabled: true
  by: required

settings:
  anchor: false
  default: true
  description: true
  escape: true
  hide-empty: false
  html: false
  indent: 2
  lockfile: false
  required: true
  sensitive: true
  type: true
